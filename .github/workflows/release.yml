name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: release-publish
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag matches pack version
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          pack_version="$(awk '$1 == "version:" { print $2; exit }' galaxio-pack.yaml)"
          if [[ "${version}" != "${pack_version}" ]]; then
            echo "Tag ${tag} does not match galaxio-pack.yaml version ${pack_version}" >&2
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
