name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - 'release/**'
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      has_templates: ${{ steps.matrix.outputs.has_templates }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Detect changed paths
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - 'galaxio-pack.yaml'
              - 'README.md'

            scala_sbt:
              - 'scala-sbt/**'
            scala_gradle:
              - 'scala-gradle/**'
            java_maven:
              - 'java-maven/**'
            kotlin_maven:
              - 'kotlin-maven/**'
            java_gradle:
              - 'java-gradle/**'
            kotlin_gradle:
              - 'kotlin-gradle/**'

      - name: Build template matrix
        id: matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          SHARED_CHANGED: ${{ steps.filter.outputs.shared }}
          SCALA_SBT_CHANGED: ${{ steps.filter.outputs.scala_sbt }}
          SCALA_GRADLE_CHANGED: ${{ steps.filter.outputs.scala_gradle }}
          JAVA_MAVEN_CHANGED: ${{ steps.filter.outputs.java_maven }}
          KOTLIN_MAVEN_CHANGED: ${{ steps.filter.outputs.kotlin_maven }}
          JAVA_GRADLE_CHANGED: ${{ steps.filter.outputs.java_gradle }}
          KOTLIN_GRADLE_CHANGED: ${{ steps.filter.outputs.kotlin_gradle }}
        run: |
          selected=()
          all_templates=(scala-sbt scala-gradle java-maven kotlin-maven java-gradle kotlin-gradle)

          if [[ "${EVENT_NAME}" != "pull_request" || "${SHARED_CHANGED:-false}" == "true" ]]; then
            selected=("${all_templates[@]}")
          else
            [[ "${SCALA_SBT_CHANGED:-false}" == "true" ]] && selected+=(scala-sbt)
            [[ "${SCALA_GRADLE_CHANGED:-false}" == "true" ]] && selected+=(scala-gradle)
            [[ "${JAVA_MAVEN_CHANGED:-false}" == "true" ]] && selected+=(java-maven)
            [[ "${KOTLIN_MAVEN_CHANGED:-false}" == "true" ]] && selected+=(kotlin-maven)
            [[ "${JAVA_GRADLE_CHANGED:-false}" == "true" ]] && selected+=(java-gradle)
            [[ "${KOTLIN_GRADLE_CHANGED:-false}" == "true" ]] && selected+=(kotlin-gradle)
          fi

          if [[ "${#selected[@]}" -eq 0 ]]; then
            echo 'has_templates=false' >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          objects=()
          for template in "${selected[@]}"; do
            case "${template}" in
              scala-sbt)
                build_tool="sbt"
                ;;
              *-maven)
                build_tool="maven"
                ;;
              *)
                build_tool="gradle"
                ;;
            esac

            objects+=("{\"template\":\"${template}\",\"build_tool\":\"${build_tool}\"}")
          done

          matrix_json="$(printf '%s\n' "${objects[@]}" | jq -cs '{include: .}')"
          echo 'has_templates=true' >> "$GITHUB_OUTPUT"
          echo "matrix=${matrix_json}" >> "$GITHUB_OUTPUT"

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.8

      - name: Run shellcheck
        run: shellcheck .github/scripts/*.sh

      - name: Run actionlint
        run: |
          "$(go env GOPATH)/bin/actionlint" -color

  versioning:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Test template version bump checker
        run: bash ./.github/scripts/check-template-version-bump_test.sh

      - name: Check template version bump
        if: github.event_name == 'pull_request'
        run: ./.github/scripts/check-template-version-bump.sh

      - name: Check README compatibility table is up to date
        run: |
          bash ./.github/scripts/update-readme-compat.sh
          if ! git diff --quiet README.md; then
            echo "README compatibility table is stale. Run:" >&2
            echo "  bash .github/scripts/update-readme-compat.sh" >&2
            echo "" >&2
            git diff README.md >&2
            exit 1
          fi

  build-galaxio:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Clone galaxio-cli
        run: git clone --depth 1 https://github.com/galax-io/galaxio-cli "${RUNNER_TEMP}/galaxio-cli"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: ${{ runner.temp }}/galaxio-cli/go.sum

      - name: Get go.sum hash for cache key
        id: gosum
        run: echo "hash=$(sha256sum "${RUNNER_TEMP}/galaxio-cli/go.sum" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache Go build cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/go/build
          key: ${{ runner.os }}-go-build-${{ steps.gosum.outputs.hash }}
          restore-keys: ${{ runner.os }}-go-build-

      - name: Build galaxio binary
        run: |
          mkdir -p "${RUNNER_TEMP}/galaxio-bin"
          cd "${RUNNER_TEMP}/galaxio-cli"
          go build -o "${RUNNER_TEMP}/galaxio-bin/galaxio" ./cmd/galaxio

      - name: Upload galaxio binary
        uses: actions/upload-artifact@v7
        with:
          name: galaxio-linux-amd64
          path: ${{ runner.temp }}/galaxio-bin/galaxio
          if-no-files-found: error

  pack-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - build-galaxio
      - lint
      - versioning
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download galaxio binary
        uses: actions/download-artifact@v4
        with:
          name: galaxio-linux-amd64
          path: ${{ runner.temp }}/galaxio-bin

      - name: Add galaxio to PATH
        run: |
          chmod +x "${RUNNER_TEMP}/galaxio-bin/galaxio"
          echo "${RUNNER_TEMP}/galaxio-bin" >> "${GITHUB_PATH}"

      - name: Validate template pack
        run: galaxio template validate local:.

  template-smoke:
    if: needs.changes.outputs.has_templates == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - changes
      - build-galaxio
      - lint
      - pack-validate
      - versioning
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.matrix) }}
    name: smoke-${{ matrix.template }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download galaxio binary
        uses: actions/download-artifact@v4
        with:
          name: galaxio-linux-amd64
          path: ${{ runner.temp }}/galaxio-bin

      - name: Add galaxio to PATH
        run: |
          chmod +x "${RUNNER_TEMP}/galaxio-bin/galaxio"
          echo "${RUNNER_TEMP}/galaxio-bin" >> "${GITHUB_PATH}"

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Maven repository
        if: matrix.build_tool == 'maven'
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ matrix.template }}-${{ hashFiles('.github/template-smoke-values.yaml', format('{0}/galaxio-template.yaml', matrix.template), format('{0}/files/pom.xml', matrix.template), format('{0}/files/.mvn/wrapper/maven-wrapper.properties', matrix.template)) }}
          restore-keys: |
            ${{ runner.os }}-maven-${{ matrix.template }}-
            ${{ runner.os }}-maven-

      - name: Cache Gradle
        if: matrix.build_tool == 'gradle'
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ matrix.template }}-${{ hashFiles('.github/template-smoke-values.yaml', format('{0}/galaxio-template.yaml', matrix.template), format('{0}/files/build.gradle', matrix.template), format('{0}/files/build.gradle.kts', matrix.template), format('{0}/files/gradle/wrapper/gradle-wrapper.properties', matrix.template)) }}
          restore-keys: |
            ${{ runner.os }}-gradle-${{ matrix.template }}-
            ${{ runner.os }}-gradle-

      - name: Cache sbt, ivy, and coursier
        if: matrix.build_tool == 'sbt'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/coursier
            ~/.ivy2/cache
            ~/.sbt
          key: ${{ runner.os }}-sbt-${{ matrix.template }}-${{ hashFiles('.github/template-smoke-values.yaml', format('{0}/galaxio-template.yaml', matrix.template), format('{0}/files/**', matrix.template), format('{0}/project/**', matrix.template)) }}
          restore-keys: |
            ${{ runner.os }}-sbt-${{ matrix.template }}-
            ${{ runner.os }}-sbt-

      - name: Setup sbt
        if: matrix.build_tool == 'sbt'
        uses: sbt/setup-sbt@v1

      - name: Run template smoke test
        uses: ./.github/actions/template-smoke
        with:
          template: ${{ matrix.template }}

      - name: Upload compile log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: compile-log-${{ matrix.template }}
          path: ${{ runner.temp }}/rendered/${{ matrix.template }}/compile.log
          if-no-files-found: ignore

      - name: Upload rendered project on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: rendered-${{ matrix.template }}
          path: ${{ runner.temp }}/rendered/${{ matrix.template }}
          if-no-files-found: ignore

  integration:
    name: integration-${{ matrix.plugin }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - build-galaxio
      - pack-validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - plugin: jdbc
          - plugin: amqp
          - plugin: kafka
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download galaxio binary
        uses: actions/download-artifact@v4
        with:
          name: galaxio-linux-amd64
          path: ${{ runner.temp }}/galaxio-bin

      - name: Add galaxio to PATH
        run: |
          chmod +x "${RUNNER_TEMP}/galaxio-bin/galaxio"
          echo "${RUNNER_TEMP}/galaxio-bin" >> "${GITHUB_PATH}"

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Cache sbt, ivy, and coursier
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/coursier
            ~/.ivy2/cache
            ~/.sbt
          key: ${{ runner.os }}-sbt-integration-${{ matrix.plugin }}-${{ hashFiles('.github/template-smoke-values.yaml', 'scala-sbt/galaxio-template.yaml') }}
          restore-keys: |
            ${{ runner.os }}-sbt-integration-${{ matrix.plugin }}-
            ${{ runner.os }}-sbt-integration-
            ${{ runner.os }}-sbt-

      - name: Start services and wait for health
        run: |
          docker compose -f .github/integration/docker-compose.yml up -d --wait
          docker compose -f .github/integration/docker-compose.yml ps

      - name: Run integration test
        run: bash .github/scripts/run-integration-test.sh "${{ matrix.plugin }}"

      - name: Upload run log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: integration-log-${{ matrix.plugin }}
          path: ${{ runner.temp }}/integration/${{ matrix.plugin }}/run.log
          if-no-files-found: ignore

      - name: Stop services
        if: always()
        run: docker compose -f .github/integration/docker-compose.yml down -v
