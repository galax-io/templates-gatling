# Default values. Override with JVM args, for example: -DbaseUrl="http://your-host.example.com"
baseUrl = "{{ .BaseUrl }}"
baseAuthUrl = "{{ .BaseAuthUrl }}"
wsBaseUrl = "{{ .WsBaseUrl }}"
intensity = "{{ .Intensity }}"
stagesNumber = {{ .StagesNumber }}
rampDuration = {{ .RampDuration }}
stageDuration = {{ .StageDuration }}
testDuration = {{ .TestDuration }}
pacing = {{ .Pacing }}
