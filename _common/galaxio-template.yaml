apiVersion: galaxio.io/v1
kind: Template
name: gatling-template
displayName: Gatling Template
description: Shared template descriptor — copied to each template directory by CI.
engine: go-template
tags:
  - gatling
inputs:
  Name:
    type: string
    default: myservice
    description: Project name.
  NameWord:
    type: string
    default: myservice
    description: Project name formatted as a single package segment.
  Package:
    type: string
    default: org.galaxio.performance
    description: Package for generated Gatling sources.
  PackagePath:
    type: string
    default: org/galaxio/performance
    description: Filesystem path matching Package.
  ScalaVersion:
    type: string
    default: 2.13.18
  JavaVersion:
    type: string
    default: "17"
    description: Java compiler release version.
  KotlinVersion:
    type: string
    default: 2.4.0
    description: Kotlin compiler version.
  SbtVersion:
    type: string
    default: 1.12.13
  GatlingVersion:
    type: string
    default: 3.13.5
  SbtGatlingVersion:
    type: string
    default: 4.18.3
  SbtScalafmtVersion:
    type: string
    default: 2.6.1
  GradleWrapperVersion:
    type: string
    default: 8.14.5
    description: Gradle distribution version for the Gradle Wrapper.
  GatlingGradlePluginVersion:
    type: string
    default: 3.13.5.4
    description: Gatling Gradle plugin version.
  MavenVersion:
    type: string
    default: 3.9.16
    description: Apache Maven version for the Maven Wrapper.
  GatlingMavenPluginVersion:
    type: string
    default: 4.16.3
    description: Gatling Maven plugin version.
  GatlingPicatinnyVersion:
    type: string
    default: 1.17.1
  BaseUrl:
    type: string
    default: http://localhost
  BaseAuthUrl:
    type: string
    default: http://localhost/auth
  WsBaseUrl:
    type: string
    default: ws://localhost/ws
  Intensity:
    type: string
    default: 60 rpm
  StagesNumber:
    type: string
    default: "2"
  RampDuration:
    type: string
    default: 1 second
  StageDuration:
    type: string
    default: 1 second
  TestDuration:
    type: string
    default: 5 seconds
  Pacing:
    type: string
    default: 1 second
  ScenarioName:
    type: string
    default: Synthetic business flow
  KafkaPluginEnabled:
    type: string
    default: "false"
  KafkaPluginVersion:
    type: string
    default: 1.0.6
  KafkaStreamsVersion:
    type: string
    default: 7.9.8-ce
  KafkaTopic:
    type: string
    default: myTopic
  KafkaUrl:
    type: string
    default: localhost:9092
  JdbcPluginEnabled:
    type: string
    default: "false"
  JdbcPluginVersion:
    type: string
    default: 1.0.3
  PostgresDriverVersion:
    type: string
    default: 42.7.7
  DbUrl:
    type: string
    default: jdbc:postgresql://localhost:5432/postgres
  DbUser:
    type: string
    default: postgres
  DbPassword:
    type: string
    default: postgres
  AmqpPluginEnabled:
    type: string
    default: "false"
  AmqpPluginVersion:
    type: string
    default: 1.2.10
  AmqpHost:
    type: string
    default: localhost
  AmqpPort:
    type: string
    default: "5672"
  AmqpLogin:
    type: string
    default: guest
  AmqpPassword:
    type: string
    default: guest
  AmqpQueue:
    type: string
    default: my_queue
  StartupBannerEnabled:
    type: string
    default: "true"
  DiagnosticsEnabled:
    type: string
    default: "false"
files:
  - from: files
    to: .
  - from: plugins/kafka
    to: .
    if: '{{ .KafkaPluginEnabled }}'
  - from: plugins/jdbc
    to: .
    if: '{{ .JdbcPluginEnabled }}'
  - from: plugins/amqp
    to: .
    if: '{{ .AmqpPluginEnabled }}'
