name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  versioning:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Test template version bump checker
        run: bash ./.github/scripts/check-template-version-bump_test.sh

      - name: Check template version bump
        if: github.event_name == 'pull_request'
        run: ./.github/scripts/check-template-version-bump.sh

  build-galaxio:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone galaxio-cli
        run: git clone --depth 1 https://github.com/galax-io/galaxio-cli "${RUNNER_TEMP}/galaxio-cli"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true
          cache-dependency-path: ${{ runner.temp }}/galaxio-cli/go.sum

      - name: Build galaxio binary
        run: |
          mkdir -p "${RUNNER_TEMP}/galaxio-bin"
          cd "${RUNNER_TEMP}/galaxio-cli"
          go build -o "${RUNNER_TEMP}/galaxio-bin/galaxio" ./cmd/galaxio

      - name: Upload galaxio binary
        uses: actions/upload-artifact@v4
        with:
          name: galaxio-linux-amd64
          path: ${{ runner.temp }}/galaxio-bin/galaxio
          if-no-files-found: error

  pack-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - build-galaxio
      - versioning
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download galaxio binary
        uses: actions/download-artifact@v4
        with:
          name: galaxio-linux-amd64
          path: ${{ runner.temp }}/galaxio-bin

      - name: Add galaxio to PATH
        run: |
          chmod +x "${RUNNER_TEMP}/galaxio-bin/galaxio"
          echo "${RUNNER_TEMP}/galaxio-bin" >> "${GITHUB_PATH}"

      - name: Validate template pack
        run: galaxio template validate local:.

  template-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - build-galaxio
      - pack-validate
      - versioning
    strategy:
      fail-fast: false
      matrix:
        include:
          - template: scala-sbt
            cache: sbt
            needs_sbt: true
          - template: scala-gradle
            cache: gradle
            needs_sbt: false
          - template: java-maven
            cache: maven
            needs_sbt: false
          - template: kotlin-maven
            cache: maven
            needs_sbt: false
          - template: java-gradle
            cache: gradle
            needs_sbt: false
          - template: kotlin-gradle
            cache: gradle
            needs_sbt: false
    name: smoke-${{ matrix.template }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download galaxio binary
        uses: actions/download-artifact@v4
        with:
          name: galaxio-linux-amd64
          path: ${{ runner.temp }}/galaxio-bin

      - name: Add galaxio to PATH
        run: |
          chmod +x "${RUNNER_TEMP}/galaxio-bin/galaxio"
          echo "${RUNNER_TEMP}/galaxio-bin" >> "${GITHUB_PATH}"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: ${{ matrix.cache }}

      - name: Cache coursier and ivy
        if: matrix.needs_sbt
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/coursier
            ~/.ivy2/cache
            ~/.sbt
          key: ${{ runner.os }}-sbt-${{ hashFiles('.github/template-smoke-values.yaml', format('{0}/galaxio-template.yaml', matrix.template), format('{0}/files/**', matrix.template)) }}
          restore-keys: |
            ${{ runner.os }}-sbt-

      - name: Setup sbt
        if: matrix.needs_sbt
        uses: sbt/setup-sbt@v1

      - name: Run template smoke test
        run: bash ./.github/scripts/run-template-smoke.sh "${{ matrix.template }}"

      - name: Upload rendered project on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rendered-${{ matrix.template }}
          path: ${{ runner.temp }}/rendered/${{ matrix.template }}
          if-no-files-found: ignore
