apiVersion: galaxio.io/v1
kind: Template
name: kotlin-maven
displayName: Gatling Kotlin maven
description: Gatling Kotlin project with Maven
engine: go-template
tags:
  - gatling
  - kotlin
  - maven
inputs:
  Name:
    type: string
    default: myservice
    description: Project name used by Maven and README.
  NameWord:
    type: string
    default: myservice
    description: Project name formatted as a Kotlin package segment.
  Package:
    type: string
    default: org.galaxio.performance
    description: Kotlin package for generated Gatling sources.
  PackagePath:
    type: string
    default: org/galaxio/performance
    description: Filesystem path matching Package.
  JavaVersion:
    type: string
    default: "17"
    description: Java compiler release version.
  KotlinVersion:
    type: string
    default: 2.2.20
    description: Kotlin compiler version.
  MavenVersion:
    type: string
    default: 3.9.15
    description: Apache Maven version for the Maven Wrapper.
  GatlingVersion:
    type: string
    default: 3.13.5
    description: Gatling framework version.
  GatlingMavenPluginVersion:
    type: string
    default: 4.16.3
    description: Gatling Maven plugin version.
  GatlingPicatinnyVersion:
    type: string
    default: 1.12.0
    description: Galaxio Gatling Picatinny library version.
  BaseUrl:
    type: string
    default: http://localhost
  BaseAuthUrl:
    type: string
    default: http://localhost/auth
  WsBaseUrl:
    type: string
    default: ws://localhost/ws
  Intensity:
    type: string
    default: 60 rpm
  StagesNumber:
    type: string
    default: "2"
  RampDuration:
    type: string
    default: 1 second
  StageDuration:
    type: string
    default: 1 second
  TestDuration:
    type: string
    default: 5 seconds
  Pacing:
    type: string
    default: 1 second
  ScenarioName:
    type: string
    default: Synthetic business flow
  KafkaPluginEnabled:
    type: string
    default: "false"
  KafkaPluginVersion:
    type: string
    default: 0.22.0
  KafkaStreamsVersion:
    type: string
    default: 7.9.5-ce
  KafkaTopic:
    type: string
    default: myTopic
  KafkaUrl:
    type: string
    default: localhost:9092
  JdbcPluginEnabled:
    type: string
    default: "false"
  JdbcPluginVersion:
    type: string
    default: 0.19.0
  PostgresDriverVersion:
    type: string
    default: 42.7.5
  DbUrl:
    type: string
    default: jdbc:postgresql://localhost:5432/postgres
  DbUser:
    type: string
    default: postgres
  DbPassword:
    type: string
    default: postgres
  AmqpPluginEnabled:
    type: string
    default: "false"
  AmqpPluginVersion:
    type: string
    default: 1.2.0
  AmqpHost:
    type: string
    default: localhost
  AmqpPort:
    type: string
    default: "5672"
  AmqpLogin:
    type: string
    default: guest
  AmqpPassword:
    type: string
    default: guest
  AmqpQueue:
    type: string
    default: my_queue
  StartupBannerEnabled:
    type: string
    default: "true"
  DiagnosticsEnabled:
    type: string
    default: "false"
files:
  - from: files
    to: .
  - from: plugins/kafka
    to: .
    if: '{{ .KafkaPluginEnabled }}'
  - from: plugins/jdbc
    to: .
    if: '{{ .JdbcPluginEnabled }}'
  - from: plugins/amqp
    to: .
    if: '{{ .AmqpPluginEnabled }}'
