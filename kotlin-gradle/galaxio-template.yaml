apiVersion: galaxio.io/v1
kind: Template
name: kotlin-gradle
displayName: Gatling Kotlin gradle
description: Gatling Kotlin project with Gradle
engine: go-template
tags:
  - gatling
  - kotlin
  - gradle
inputs:
  Name:
    type: string
    default: myservice
    description: Project name used by Gradle and README.
  NameWord:
    type: string
    default: myservice
    description: Project name formatted as a Kotlin package segment.
  Package:
    type: string
    default: org.galaxio.performance
    description: Kotlin package for generated Gatling sources.
  PackagePath:
    type: string
    default: org/galaxio/performance
    description: Filesystem path matching Package.
  JavaVersion:
    type: string
    default: "17"
    description: Java compiler release version.
  KotlinVersion:
    type: string
    default: 2.2.20
    description: Kotlin compiler version.
  GradleWrapperVersion:
    type: string
    default: 9.4.1
    description: Gradle distribution version for the Gradle Wrapper.
  GatlingVersion:
    type: string
    default: 3.11.5
    description: Gatling framework version.
  GatlingGradlePluginVersion:
    type: string
    default: 3.11.5.2
    description: Gatling Gradle plugin version.
  GatlingPicatinnyVersion:
    type: string
    default: 1.2.0
    description: Galaxio Gatling Picatinny library version.
  BaseUrl:
    type: string
    default: http://localhost
  BaseAuthUrl:
    type: string
    default: http://localhost/auth
  WsBaseUrl:
    type: string
    default: ws://localhost/ws
  Intensity:
    type: string
    default: 60 rpm
  StagesNumber:
    type: string
    default: "2"
  RampDuration:
    type: string
    default: 1 second
  StageDuration:
    type: string
    default: 1 second
  TestDuration:
    type: string
    default: 5 seconds
  Pacing:
    type: string
    default: 1 second
  ScenarioName:
    type: string
    default: Synthetic business flow
  KafkaPluginEnabled:
    type: string
    default: "false"
  KafkaPluginVersion:
    type: string
    default: 1.0.0-RC2
  KafkaTopic:
    type: string
    default: myTopic
  KafkaUrl:
    type: string
    default: localhost:9092
  JdbcPluginEnabled:
    type: string
    default: "false"
  JdbcPluginVersion:
    type: string
    default: 0.14.2
  DbUrl:
    type: string
    default: jdbc:postgresql://localhost:5432/postgres
  DbUser:
    type: string
    default: postgres
  DbPassword:
    type: string
    default: postgres
  AmqpPluginEnabled:
    type: string
    default: "false"
  AmqpPluginVersion:
    type: string
    default: 0.14.0
  AmqpHost:
    type: string
    default: localhost
  AmqpPort:
    type: string
    default: "5672"
  AmqpLogin:
    type: string
    default: guest
  AmqpPassword:
    type: string
    default: guest
  AmqpQueue:
    type: string
    default: my_queue
  StartupBannerEnabled:
    type: string
    default: "true"
  DiagnosticsEnabled:
    type: string
    default: "false"
files:
  - from: files
    to: .
  - from: plugins/kafka
    to: .
    if: '{{ .KafkaPluginEnabled }}'
  - from: plugins/jdbc
    to: .
    if: '{{ .JdbcPluginEnabled }}'
  - from: plugins/amqp
    to: .
    if: '{{ .AmqpPluginEnabled }}'
