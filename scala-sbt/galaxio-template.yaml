apiVersion: galaxio.io/v1
kind: Template
name: scala-sbt
displayName: Gatling Scala sbt
description: Gatling Scala project with sbt compatible with galax-io/gatling-template.g8 defaults
engine: go-template
tags:
  - gatling
  - scala
  - sbt
inputs:
  Name:
    type: string
    default: myservice
    description: Project name used by sbt and README.
  NameWord:
    type: string
    default: myservice
    description: Project name formatted as a Scala package segment.
  Package:
    type: string
    default: org.galaxio.performance
    description: Scala package for generated Gatling sources.
  PackagePath:
    type: string
    default: org/galaxio/performance
    description: Filesystem path matching Package.
  ScalaVersion:
    type: string
    default: 2.13.18
  SbtVersion:
    type: string
    default: 1.12.2
  GatlingVersion:
    type: string
    default: 3.11.5
  SbtGatlingVersion:
    type: string
    default: 4.18.0
  SbtScalafmtVersion:
    type: string
    default: 2.5.6
  GatlingPicatinnyVersion:
    type: string
    default: 1.0.1
files:
  - from: files
    to: .
