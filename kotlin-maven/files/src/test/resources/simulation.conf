# Default values. Override with JVM args, for example: -DbaseUrl="http://your-host.example.com"
baseUrl = "{{ .BaseUrl }}"
baseAuthUrl = "{{ .BaseAuthUrl }}"
wsBaseUrl = "{{ .WsBaseUrl }}"
intensity = "{{ .Intensity }}"
stagesNumber = {{ .StagesNumber }}
rampDuration = {{ .RampDuration }}
stageDuration = {{ .StageDuration }}
testDuration = {{ .TestDuration }}
pacing = {{ .Pacing }}
scenarioName = "{{ .ScenarioName }}"
{{- if eq .KafkaPluginEnabled "true" }}
kafkaUrl = "{{ .KafkaUrl }}"
kafkaTopic = "{{ .KafkaTopic }}"
{{- end }}
{{- if eq .JdbcPluginEnabled "true" }}
dbUrl = "{{ .DbUrl }}"
dbUser = "{{ .DbUser }}"
dbPassword = "{{ .DbPassword }}"
{{- end }}
{{- if eq .AmqpPluginEnabled "true" }}
amqpHost = "{{ .AmqpHost }}"
amqpPort = {{ .AmqpPort }}
amqpLogin = "{{ .AmqpLogin }}"
amqpPassword = "{{ .AmqpPassword }}"
amqpQueue = "{{ .AmqpQueue }}"
{{- end }}

picatinny.startup.banner.enabled = {{ .StartupBannerEnabled }}
picatinny.diagnostics.enabled = {{ .DiagnosticsEnabled }}
