apiVersion: galaxio.io/v1
kind: Template
name: scala-sbt
displayName: Gatling Scala sbt
description: Gatling Scala project with sbt
engine: go-template
tags:
  - gatling
  - scala
  - sbt
inputs:
  Name:
    type: string
    default: myservice
    description: Project name used by sbt and README.
  NameWord:
    type: string
    default: myservice
    description: Project name formatted as a Scala package segment.
  Package:
    type: string
    default: org.galaxio.performance
    description: Scala package for generated Gatling sources.
  PackagePath:
    type: string
    default: org/galaxio/performance
    description: Filesystem path matching Package.
  ScalaVersion:
    type: string
    default: 2.13.18
  SbtVersion:
    type: string
    default: 1.12.2
  GatlingVersion:
    type: string
    default: 3.11.5
  SbtGatlingVersion:
    type: string
    default: 4.18.0
  SbtScalafmtVersion:
    type: string
    default: 2.5.6
  GatlingPicatinnyVersion:
    type: string
    default: 1.2.0
  BaseUrl:
    type: string
    default: http://localhost
  BaseAuthUrl:
    type: string
    default: http://localhost/auth
  WsBaseUrl:
    type: string
    default: ws://localhost/ws
  Intensity:
    type: string
    default: 60 rpm
  StagesNumber:
    type: string
    default: "2"
  RampDuration:
    type: string
    default: 1 second
  StageDuration:
    type: string
    default: 1 second
  TestDuration:
    type: string
    default: 5 seconds
  Pacing:
    type: string
    default: 1 second
  ScenarioName:
    type: string
    default: Synthetic business flow
  KafkaPluginEnabled:
    type: string
    default: "false"
  KafkaPluginVersion:
    type: string
    default: 1.0.0-RC2
  KafkaTopic:
    type: string
    default: myTopic
  KafkaUrl:
    type: string
    default: localhost:9092
  JdbcPluginEnabled:
    type: string
    default: "false"
  JdbcPluginVersion:
    type: string
    default: 0.14.2
  DbUrl:
    type: string
    default: jdbc:postgresql://localhost:5432/postgres
  DbUser:
    type: string
    default: postgres
  DbPassword:
    type: string
    default: postgres
  AmqpPluginEnabled:
    type: string
    default: "false"
  AmqpPluginVersion:
    type: string
    default: 0.14.0
  AmqpHost:
    type: string
    default: localhost
  AmqpPort:
    type: string
    default: "5672"
  AmqpLogin:
    type: string
    default: guest
  AmqpPassword:
    type: string
    default: guest
  AmqpQueue:
    type: string
    default: my_queue
  StartupBannerEnabled:
    type: string
    default: "true"
  DiagnosticsEnabled:
    type: string
    default: "false"
files:
  - from: files
    to: .
  - from: plugins/kafka
    to: .
    if: '{{ .KafkaPluginEnabled }}'
  - from: plugins/jdbc
    to: .
    if: '{{ .JdbcPluginEnabled }}'
  - from: plugins/amqp
    to: .
    if: '{{ .AmqpPluginEnabled }}'
